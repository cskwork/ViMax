chat_model:
  class_path: tools.ChatModelClaudeCodeCLI
  init_args:
    command: claude
    model: sonnet
    timeout_seconds: 600
    disable_tools: true

image_generator:
  class_path: tools.ImageGeneratorCodexCLI
  init_args:
    command: codex
    work_dir: .working_dir/codex_image_gen
    timeout_seconds: 1200
  # Rate limits for image generation CLI calls.
  # Set to null to disable rate limiting for this service.
  max_requests_per_minute: 2
  max_requests_per_day: 50

video_generator:
  class_path: tools.VideoGeneratorGeminiOmniPlaywright
  init_args:
    # Drives the logged-in Chrome via the gemini-omni-video skill (Playwright Agent CLI).
    # Requires Chrome open + signed into an account whose desktop Gemini shows 동영상 만들기.
    app_url: https://gemini.google.com/u/0/app?hl=ko
    attach: cdp            # cdp (non-interactive) or extension (user clicks Connect)
    session: gemini
    work_dir: .working_dir/gemini_omni_playwright
    timeout_seconds: 600
    poll_interval: 15
    # skill_dir defaults to ~/.claude/skills/gemini-omni-video (or set GEMINI_OMNI_SKILL_DIR)
  # Rate limits for video generation calls (each drives one browser request).
  # Set to null to disable rate limiting for this service.
  max_requests_per_minute: 2
  max_requests_per_day: 30

working_dir: .working_dir/idea2video
